<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa Uzun | Systems & DevOps</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/svgs/solid/terminal.svg" type="image/svg+xml">

    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.4);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(56, 189, 248, 0.08) 0%, transparent 35%);
        }

        .container {
            max-width: 1000px;
            width: 92%;
            margin: 60px auto;
            animation: fadeIn 0.8s ease-out;
        }

        /* Glassmorphism Header */
        header {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 5px; }
        .hero-title { font-family: var(--font-mono); color: var(--accent); font-size: 1.1rem; font-weight: 500; }

        /* Typing Text Style */
        .typing-container {
            height: 30px;
            margin-top: 15px;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-style: italic;
        }
        #typing-text::after {
            content: '|';
            animation: blink 0.8s infinite;
            color: var(--accent);
            margin-left: 3px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Motto Tags */
        .motto-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 35px;
        }

        .motto-list li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .motto-list li a {
            text-decoration: none;
